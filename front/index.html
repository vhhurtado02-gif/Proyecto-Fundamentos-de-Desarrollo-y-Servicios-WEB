<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración de Horarios | CIAF</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
      color: #e0e6f0;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #cargandoApp {
      text-align: center;
      font-size: 1.1em;
      color: #4a9eff;
    }
    #cargandoApp::before {
      content: '📋';
      display: block;
      font-size: 2.5em;
      margin-bottom: 12px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
  </style>
  <noscript>
    <p style="padding:2em;font-family:sans-serif;font-size:1.1em;color:#ff4444;text-align:center;">
      ⚠️ Este aplicativo requiere JavaScript habilitado.
    </p>
  </noscript>
</head>
<body>
  <div id="contenedorPrincipal">
    <p id="cargandoApp">Iniciando aplicativo...</p>
  </div>
  <script src="/front/appHorarios.js"></script>
</body>
</html>
